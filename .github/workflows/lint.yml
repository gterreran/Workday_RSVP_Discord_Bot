name: lint

on:
  push:
    branches: ["main", "dev"]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: |
          python -m pip install -U pip
          pip install ruff

      - name: Ruff check
        run: |
          ruff check .
