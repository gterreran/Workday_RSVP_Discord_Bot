name: tests

on:
  push:
    branches: ["main", "dev"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install -U pip
          pip install -e ".[test]"

      - name: Run pytest
        run: |
          pytest
